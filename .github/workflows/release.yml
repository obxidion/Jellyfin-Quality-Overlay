name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install jprm
        run: pipx install jprm

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        run: |
          mkdir -p artifacts
          jprm plugin build . --version "${{ steps.version.outputs.value }}" --output artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip

      - name: Update repository manifest
        env:
          URL_BASE: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          [ -f manifest.json ] || echo '[]' > manifest.json
          ZIP="$(ls artifacts/*.zip)"
          jprm repo add --url "$URL_BASE" ./ "$ZIP"
          rm -f ./*.zip
          IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/$DEFAULT_BRANCH/logo.png" \
            node -e "const fs=require('fs');const m=JSON.parse(fs.readFileSync('manifest.json','utf8'));for(const p of m){if(fs.existsSync('logo.png'))p.imageUrl=process.env.IMAGE_URL;}fs.writeFileSync('manifest.json',JSON.stringify(m,null,4)+'\n');"

      - name: Commit manifest
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "Manifest unchanged."
          else
            git commit -m "Update repository manifest for ${{ github.ref_name }}"
            git push origin "HEAD:$DEFAULT_BRANCH"
          fi
